server:
    port: 8084

spring:
    main:
        allow-bean-definition-overriding: true
    application:
        name: order-service

    profiles:
        active: dev

    datasource:
        url: jdbc:mysql://${DB_HOST:localhost}:3306/order_db?createDatabaseIfNotExist=true
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:Frustum@7#}

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USERNAME:guest}
        password: ${RABBITMQ_PASSWORD:guest}
gateway:
  secret: booknest-gateway-internal-secret-key-2026-secure-abcdef123456

eureka:
    instance:
        hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
        prefer-ip-address: true
    client:
        service-url:
            defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql:3306/order_db?createDatabaseIfNotExist=true
  
  rabbitmq:
    host: rabbitmq

eureka:
  instance:
    hostname: order-service
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka

razorpay:
    key: ${RAZORPAY_KEY:}
    secret: ${RAZORPAY_SECRET:}

booknest:
    rabbitmq:
        order-exchange: booknest.order.events
        notification-queue: booknest.notification.queue
        routing-key: order.notification
