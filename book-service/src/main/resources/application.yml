server:
    port: 8082

spring:
    application:
        name: book-service

    datasource:
        url: jdbc:mysql://${DB_HOST:localhost}:3306/book_db?createDatabaseIfNotExist=true
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:Frustum@7#}

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        
    redis:
        host: ${REDIS_HOST:localhost}
        port: ${REDIS_PORT:6379}
        timeout: 2000ms
        
    cache:
        type: redis
        redis:
            time-to-live: 3600000 # 1 hour

gateway:
  secret: booknest-gateway-internal-secret-key-2026-secure-abcdef123456

eureka:
    instance:
        hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
        prefer-ip-address: true
    client:
        service-url:
            defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql:3306/book_db?createDatabaseIfNotExist=true
  
  redis:
    host: redis

eureka:
  instance:
    hostname: book-service
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka

security:
  jwt:
    secret: ${JWT_SECRET}
