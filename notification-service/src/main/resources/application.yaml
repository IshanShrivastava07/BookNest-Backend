server:
  port: 8088

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/notification_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Frustum@7#}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

gateway:
  secret: booknest-gateway-internal-secret-key-2026-secure-abcdef123456

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql:3306/notification_db?createDatabaseIfNotExist=true
  
  rabbitmq:
    host: rabbitmq

eureka:
  instance:
    hostname: notification-service
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka

booknest:
  rabbitmq:
    order-exchange: booknest.order.events
    notification-queue: booknest.notification.queue
    routing-key: order.notification
    auth-queue: booknest.auth.queue
    auth-routing-key: auth.notification
    wallet-queue: booknest.wallet.queue
    wallet-routing-key: wallet.notification